version: 0.7.0

input_data: "data/base"

#Unsolved Networks
planning_unsolved_network_unfiltered_nc: networks/unsolved/planning_base_network_unfiltered.nc
planning_unsolved_network_csv: networks/unsolved/planning_base_network_csv
planning_unsolved_network_nc: networks/unsolved/planning_base_network.nc
dispatch_unsolved_network_csv: networks/unsolved/dispatch_base_network_csv
dispatch_unsolved_network_nc: networks/unsolved/dispatch_base_network.nc

#Solved Networks
planning_output_file_csv: "results/planning_output_csv"
planning_output_file_nc: "results/planning_output.nc"
#dispatch_output_file_csv: "results/dispatch_output_csv"
dispatch_output_file_csv: "results/dispatch_output"
#dispatch_output_file_nc: "results/dispatch_output.nc"
uppercase: true

run:
  name: "tutorial" # use this to keep track of runs with different settings
  disable_progressbar: false # set to true to disable the progressbar
  shared_resources: false # set to true to share the default resources across runs
  shared_cutouts: true # set to true to share the default cutout(s) across runs
  validation: false # set to true to run back-casting plots

load:
  mode: "custom"
  load_growth_filepath: "data/loads_forecast.csv"
  ref_year: [2021]

components:
  # folder_name: "../pypsa_cad/pypsa_cad/preprocess/components"
  folder_name: ""
  module_dir: "../pypsa_cad/pypsa_cad/preprocess/components"
  obps: true
  technology_costs: ""
  # technology_costs: "../pypsa_cad/pypsa_cad/preprocess/components"
  # years: [2021, 2022]
  years: [2021]
  carbon_tax:
    '2021': 50
    '2025': 95
    '2020': 170

snapshots:
  method: "AVG_PEAK"
  include_hydro: false
  saving_folder_path: saves
  rep_length: ""
  cluster: ""
  extreme_dats_select: ""
  save_fig: ""
  save_csv: ""
  solver: ""
  load_mode: "Default" 
  years: [2025, 2030]
  folder_name: data/base
  ref_years: 2025
  investment_periods: 29
  provinces_selection: ""
  aggregate: ""
  extreme_days_select: ""

extra_loads:
  is_used: false
  extra_loads: data/base
  path: data/base

planning:
  reference_year: 2025
  start_year: 2025
  forecast_year: 2050
  investment_period: [2025, 2030]
  #investment_period: [2021, 2025, 2030, 2035, 2040, 2045, 2050]
  load_shedding: false
  constraints:
    # add_spilling_variable: true
    add_stop_production_constraint:
      2030: ["gas"]
    component_capacity_expansion_constraint: 
      custom_constraint_filepath: "data/constraints/custom_constraints.csv"
    planning_reserve_margin:
      capacity_values_placeholder_filepath: "data/constraints/capacity_values_placeholder.csv"
      provinces_list:
        QC: 1.2

