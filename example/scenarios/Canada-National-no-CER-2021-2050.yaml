input_data: model/Canada-National

#Unsolved Networks
planning_unsolved_network_unfiltered_nc: networks/unsolved/planning_base_network_unfiltered.nc
planning_unsolved_network_csv: networks/unsolved/planning_base_network_csv
planning_unsolved_network_nc: networks/unsolved/planning_base_network.nc
dispatch_unsolved_network_csv: networks/unsolved/dispatch_base_network_csv
dispatch_unsolved_network_nc: networks/unsolved/dispatch_base_network.nc

#Solved Networks
planning_output_file_csv: "results/planning_output_csv"
planning_output_file_nc: "results/planning_output.nc"
#dispatch_output_file_csv: "results/dispatch_output_csv"
dispatch_output_file_csv: "results/dispatch_output"
#dispatch_output_file_nc: "results/dispatch_output.nc"
uppercase: true

run:
  name: "canada-national-no-cer-2021-2050" # use this to keep track of runs with different settings
  disable_progressbar: false # set to true to disable the progressbar
  shared_resources: false # set to true to share the default resources across runs
  shared_cutouts: true # set to true to share the default cutout(s) across runs
  validation: false # set to true to run back-casting plots

year_settings:
  ref_year: &ref_year 2021
  start_year: &start_year 2021
  forecast_year: &forecast_year 2050
  investment_period: &investment_period [2021, 2025, 2030, 2035, 2040, 2045, 2050]

solving:
  solver:
    name: &solver_name highs
    options: highs-default

load:
  load_mode: &load_mode "custom"
  load_growth_filepath: "model/Canada-National/loads_forecast.csv"
  ref_year: [*ref_year]

components:
  override_dir: ""
  components_dir: "data/components"
  costs_dir: "data/costs"
  obps: true
  technology_costs: "default_costs"
  years: *investment_period
  carbon_tax:
    "2021": 50 # $ per tonne, based on federal minimums
    "2025": 125
    "2030": 170
    "2035": 170
    "2040": 170
    "2045": 170
    "2050": 170

snapshots:
  method: "OPT_VRE_HYDRO"
  load_mode: *load_mode
  folder_name: "model/Canada-National"
  load_growth_forecast: "model/Canada-National/loads_forecast.csv"
  years: *investment_period
  ref_year: *ref_year
  investment_periods: 5

  # Rep days config
  # rep_length: None
  cluster: 50
  include_hydro: true
  solver: *solver_name
  extreme_days_select: false
  save_fig: false
  save_csv: false
  saving_folder_path: saves
  provinces_selection: ["AB", "BC", "MB", "NB", "NS", "ON", "PE", "QC", "SK", "NL"]
  # year: None
  aggregate: false

extra_loads:
  is_used: false
  extra_loads: data/base
  path: data/base

planning:
  reference_year: 2021
  start_year: 2021
  forecast_year: 2021
  investment_period: [2021, 2025, 2030, 2035, 2040, 2045, 2050]
  load_shedding: false
  test_mode: true  # Set to true to limit model to first 6 snapshots per investment period for quick testing
  constraints:
    add_spilling_variable: true
    add_stop_production_constraint:
      2030: ["coal"]
    planning_reserve_margin:
      capacity_values_placeholder_filepath: "data/constraints/capacity_values_placeholder.csv"
      provinces_list:
        "PE": 1.2
        "NB": 1.2
        "NS": 1.2
        "AB": 1.2
        "BC": 1.2
        "MB": 1.2
        "ON": 1.2
        "QC": 1.2
        "SK": 1.2
        "NL": 1.2
    CER_constraint:
      # aggregation levels: provincial, group, individual
      aggregation: 'provincial'
      # year that constraint becomes active
      year: 2035
      # carriers to include
      carriers: ['oil', 'gas', 'diesel']
      # values for emissions limit and offset is emission intensity (in tC02eq/GWh)
      values: {
        limit: {2035: 65, 2050: 0},
        offset: {2035: 35, 2050: 42}
        }
      # minimum capacity
      min_cap: 25

dispatch:
  #Snapshots related
  horizon: 336 #336 #2 weeks in hours
  overlap: 48 #48
  investment_period: [] #If empty, it will take the planning investment periods

  #Additional Solving options
  load_shedding: true
  linearized_unit_commitment: false

  constraints:
    # add_spilling_variable: true
    add_stop_production_constraint:
      2030: ["coal"]
    add_bidirection_link_constraint: {}
    # add_prevent_spill_if_not_fully_charged_constraint:
    #   maximum_soc_storage_value: 2000
    CER_constraint:
      # modes = hourly, emissions
      mode: 'emissions'
      # aggregation levels: provincial, group, individual
      aggregation: 'provincial'
      # year that constraint becomes active
      year: 2035
      # carriers to include
      carriers: ['oil', 'gas', 'diesel']
      # values for hourly mode is number of hours, values for emissions mode is emission intensity (in tC02eq/GWh)
      values: {
        limit: {2021: 65},
        offset: {2021: 35}
        }
      # minimum capacity
      min_cap: 25
      # forecast hours based on net load ('load'), uniformly ('uniform'), or assign max to first UC period and carry leftover ('carryover')
      forecast_hours: 'carryover'
