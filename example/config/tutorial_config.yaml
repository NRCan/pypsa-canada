version: 0.7.0

input_data: "data/base"

run:
  name: "tutorial" # use this to keep track of runs with different settings
  disable_progressbar: false # set to true to disable the progressbar
  shared_resources: false # set to true to share the default resources across runs
  shared_cutouts: true # set to true to share the default cutout(s) across runs
  validation: false # set to true to run back-casting plots

load:
  mode: "custom"
  load_growth_filepath: "data/loads_forecast.csv"
  ref_year: [2021]

components:
  # folder_name: "../pypsa_cad/pypsa_cad/preprocess/components"
  folder_name: ""
  components_dir: "pypsa_canada/workflow/scripts/components"
  obps: true
  technology_costs: ""
  # technology_costs: "../pypsa_cad/pypsa_cad/preprocess/components"
  # years: [2021, 2022]
  years: [2021]
  carbon_tax:
    '2021': 50
    '2025': 95
    '2020': 170

snapshots:
  method: "OPT"
  include_hydro: true
  saving_folder_path: saves
  rep_length: ""
  cluster: [12, 20]
  extreme_dats_select: ""
  save_fig: ""
  save_csv: ""
  solver: ""
  load_mode: "Default"
  years: [2021, 2025, 2030]
  folder_name: data/base
  ref_years: 2021
  investment_periods: 25
  provinces_selection: ""
  aggregate: ""
  extreme_days_select: ""

extra_loads:
  is_used: false
  extra_loads: data/base
  path: data/base

planning:
  reference_year: 2021
  start_year: 2021
  forecast_year: 2050
  investment_period: [2021, 2025, 2030]
  #investment_period: [2021, 2025, 2030, 2035, 2040, 2045, 2050]
  load_shedding: false
  test_mode: false  # Set to true to limit model to first 6 snapshots per investment period for quick testing
  constraints:
    add_spilling_variable: true
    add_stop_production_constraint:
      2030: ["gas"]

dispatch:
  #Snapshots related
  horizon: 3 #336 #2 weeks in hours
  overlap: 1 #48
  investment_period: [] #If empty, it will take the planning investment periods

  #Additional Solving options
  load_shedding: true
  linearized_unit_commitment: false

  constraints:
    add_spilling_variable: true
    add_stop_production_constraint:
      2030: ["gas"]
    add_bidirection_link_constraint: {}
    add_prevent_spill_if_not_fully_charged_constraint:
      maximum_soc_storage_value: 2000


solving:
  solver:
    name: highs
    options: highs-default

