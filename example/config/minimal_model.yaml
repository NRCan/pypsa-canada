input_data: model/minimal_model

run:
  name: "minimal_model-2021-2050" # use this to keep track of runs with different settings
  disable_progressbar: false # set to true to disable the progressbar
  shared_resources: false # set to true to share the default resources across runs
  shared_cutouts: true # set to true to share the default cutout(s) across runs
  validation: false # set to true to run back-casting plots

year_settings:
  ref_year: 2021
  start_year: 2021
  forecast_year: 2050
  investment_period: [2021, 2035, 2050]
  discount_rate: 0.05

solving:
  options:
    planning:
      load_shedding: false
      linearized_unit_commitment: false
      keep_files: false
      store_model: false
    dispatch:
      load_shedding: true
      linearized_unit_commitment: false
      keep_files: false
      store_model: false
  solver:
    name: &solver_name highs
    options: highs-fast

load:
  #Load CSV file already containing every year load:
  load_mode: &load_mode "FULL_LOAD"
  load_growth_forecast: "model/minimal_model/loads_forecast.csv"
  #Apply growth factor to a base year profile "loads-p_set.csv":
  # load_mode: &load_mode "GROWTH_FORECAST"
  # load_growth_forecast: "model/minimal_model/load_growth.csv"

components:
  override_dir: ""
  components_dir: "data/components"
  costs_dir: "data/costs"
  obps: true
  technology_costs: "Default_costs"
  carbon_tax:
    "2021": 50 # $ per tonne, based on federal minimums
    "2025": 125
    "2030": 170
    "2035": 170
    "2040": 170
    "2045": 170
    "2050": 170

snapshots:
  #method: "OPT_VRE_HYDRO", "KMEDOID_VRE_HYDRO", "CARPE_DIEM" or "AVG_PEAK"
  method: "OPT_VRE_HYDRO"
  load_mode: *load_mode
  folder_name: "model/minimal_model"
  last_investment_period: 5 #duration in years

  # Rep days config
  # rep_length: None
  cluster: 5
  include_hydro: true
  solver: *solver_name
  extreme_days_select: false
  save_fig: false
  save_csv: false
  saving_folder_path: saves
  provinces_selection: ["NB", "ON", "QC"]
  # year: None
  # aggregate: false
  mip_gap: 0.01

extra_loads:
  is_used: false
  extra_loads: data/base
  path: data/base

planning:
  constraints:
    add_stop_production:
      enable: true
      years:
        2030: ["coal"]
    planning_reserve_margin:
      enable: true
      capacity_values_placeholder_filepath: "data/constraints/capacity_values_placeholder.csv"
      provinces_list:
        "NB": 1.2
        "ON": 1.2
        "QC": 1.2
    CER_constraint:
      enable: true
      # aggregation levels: provincial, group, individual
      aggregation: 'provincial'
      # year that constraint becomes active
      year: 2035
      # carriers to include
      carriers: ['oil', 'gas', 'diesel']
      # values for emissions limit and offset is emission intensity (in tC02eq/GWh)
      values: {
        limit: {2035: 65, 2050: 0},
        offset: {2035: 35, 2050: 42}
        }
      # minimum capacity
      min_cap: 25
    component_capacity_expansion_constraint:
      enable: true
      custom_constraint_filepath: "data/constraints/custom_constraints.csv"

  modify_components:
    links:
      # 'OPT_QCNB_HVDC':
      #   p_nom_extendable: False
      #   efficiency: 0.55
      #   p_nom: 3455

      # 'EelRiver_QCa': Delete
    generators:
      'BUS_1 Coal':
        p_nom_extendable: False
        efficiency: 0.55
        p_nom: 3455

      # 'EelRiver_QCa': Delete
    storage_units:
    lines:
    stores:

dispatch:
  #Snapshots related
  horizon: 336 #336 #2 weeks in hours
  overlap: 48 #48
  investment_period: [] #If empty, it will take the planning investment periods

  constraints:
    # add_spilling_variable:
    #   enable: true
    add_stop_production:
      enable: true
      years:
        2030: ["coal"]
    # add_bidirection_link_constraint: {}
    #   enable: false
    # add_prevent_spill_if_not_fully_charged_constraint:
    #   enable: false
    #   maximum_soc_storage_value: 2000
    CER_constraint:
      enable: true
      # modes = hourly, emissions
      mode: 'emissions'
      # aggregation levels: provincial, group, individual
      aggregation: 'provincial'
      # year that constraint becomes active
      year: 2035
      # carriers to include
      carriers: ['oil', 'gas', 'diesel']
      # values for hourly mode is number of hours, values for emissions mode is emission intensity (in tC02eq/GWh)
      values: {
        limit: {2035: 65, 2050: 0},
        offset: {2035: 35, 2050: 42}
        }
      # minimum capacity
      min_cap: 25
      # forecast hours based on net load ('load'), uniformly ('uniform'), or assign max to first UC period and carry leftover ('carryover')
      forecast_hours: 'carryover'

# postprocess:
#   result_type: "Provincial"  # "Provincial" or "Nodal"
#   reference_scenario: 0  # 0 = auto-select (scenario with most representative days)
