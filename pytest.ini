[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v 
    --tb=short
    --strict-markers
markers =
    unit: Unit tests (fast, no model solving)
    slow: Tests that solve optimization models (slow)
    integration: Integration tests
    planning: Tests for planning mode constraints
    dispatch: Tests for dispatch mode constraints
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s %(levelname)s %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S
